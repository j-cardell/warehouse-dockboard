# Warehouse Dock Board 
#
# All files (code + data) stay within project folder
# No external host paths required

services:
  dockboard:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: warehouse-dockboard
    ports:
      - "${PORT:-3456}:${PORT:-3456}"
    volumes:
      - dockboard-data:/app/data
      - ./scripts:/app/scripts:ro
    env_file:
      - .env
    environment:
      - NODE_ENV=production
    restart: unless-stopped

volumes:
  dockboard-data:
    driver: local
