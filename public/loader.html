<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Loader Interface - Warehouse Dock Board</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --bg: #0f172a;
            --bg-light: #1e293b;
            --bg-lighter: #334155;
            --text: #f8fafc;
            --text-muted: #94a3b8;
            --accent: #3b82f6;
            --accent-light: #60a5fa;
            --danger: #ef4444;
            --danger-dark: #dc2626;
            --success: #22c55e;
            --success-dark: #16a34a;
            --warning: #f59e0b;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Header */
        .header {
            background: var(--bg-light);
            padding: 1rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 2px solid var(--bg-lighter);
        }

        .header h1 {
            font-size: 1.25rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .header-icon {
            font-size: 1.5rem;
        }

        .loader-name {
            color: var(--accent-light);
            font-weight: 600;
        }

        /* Screen container */
        .screen {
            flex: 1;
            display: none;
            flex-direction: column;
            padding: 1.5rem;
            gap: 1.5rem;
        }

        .screen.active {
            display: flex;
        }

        /* Name selection screen */
        .name-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1rem;
            overflow-y: auto;
        }

        .name-btn {
            background: var(--bg-lighter);
            border: 2px solid transparent;
            color: var(--text);
            padding: 1.5rem 1rem;
            font-size: 1.25rem;
            border-radius: 0.75rem;
            cursor: pointer;
            transition: all 0.2s;
            text-align: center;
            font-weight: 500;
        }

        .name-btn:hover, .name-btn:active {
            background: var(--accent);
            border-color: var(--accent-light);
            transform: scale(0.98);
        }

        /* Door entry screen */
        .door-display {
            background: var(--bg-light);
            border: 3px solid var(--bg-lighter);
            border-radius: 1rem;
            padding: 2rem;
            text-align: center;
            min-height: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .door-number {
            font-size: 4rem;
            font-weight: bold;
            color: var(--accent-light);
            letter-spacing: 0.1em;
        }

        .door-placeholder {
            font-size: 1.5rem;
            color: var(--text-muted);
        }

        .keypad {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1rem;
        }

        .key {
            background: var(--bg-lighter);
            border: 2px solid var(--bg-lighter);
            color: var(--text);
            padding: 1.5rem;
            font-size: 2rem;
            border-radius: 0.75rem;
            cursor: pointer;
            transition: all 0.1s;
            font-weight: 500;
        }

        .key:hover, .key:active {
            background: var(--accent);
            border-color: var(--accent-light);
            transform: scale(0.95);
        }

        .key.backspace {
            background: var(--danger);
        }

        .key.backspace:hover, .key.backspace:active {
            background: var(--danger-dark);
        }

        .key.submit {
            background: var(--success);
            grid-column: span 2;
            font-size: 1.5rem;
        }

        .key.submit:hover, .key.submit:active {
            background: var(--success-dark);
        }

        /* Verification screen */
        .verify-card {
            background: var(--bg-light);
            border: 3px solid var(--bg-lighter);
            border-radius: 1rem;
            padding: 2rem;
            text-align: center;
        }

        .verify-door {
            font-size: 1.5rem;
            color: var(--text-muted);
            margin-bottom: 1rem;
        }

        .verify-trailer {
            font-size: 2.5rem;
            font-weight: bold;
            margin-bottom: 0.5rem;
        }

        .verify-carrier {
            font-size: 1.75rem;
            color: var(--accent-light);
            margin-bottom: 2rem;
        }

        .verify-question {
            font-size: 1.25rem;
            color: var(--text-muted);
            margin-bottom: 1.5rem;
        }

        .verify-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }

        .btn {
            padding: 1.5rem 2rem;
            font-size: 1.5rem;
            border: none;
            border-radius: 0.75rem;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s;
        }

        .btn-yes {
            background: var(--success);
            color: white;
        }

        .btn-yes:hover, .btn-yes:active {
            background: var(--success-dark);
            transform: scale(0.98);
        }

        .btn-no {
            background: var(--danger);
            color: white;
        }

        .btn-no:hover, .btn-no:active {
            background: var(--danger-dark);
            transform: scale(0.98);
        }

        /* Error screen */
        .error-screen {
            background: var(--danger);
            flex: 1;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            text-align: center;
        }

        .error-screen.active {
            display: flex;
        }

        .error-icon {
            font-size: 5rem;
            margin-bottom: 1rem;
        }

        .error-text {
            font-size: 2.5rem;
            font-weight: bold;
            margin-bottom: 1rem;
        }

        .error-subtext {
            font-size: 1.5rem;
            opacity: 0.9;
        }

        .error-tap {
            margin-top: 3rem;
            font-size: 1.25rem;
            opacity: 0.7;
        }

        /* Status buttons screen */
        .status-header {
            text-align: center;
            margin-bottom: 1rem;
        }

        .status-door {
            font-size: 1.5rem;
            color: var(--text-muted);
        }

        .status-trailer {
            font-size: 2rem;
            font-weight: bold;
            margin-top: 0.5rem;
        }

        .status-buttons {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .status-btn {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border: 4px solid transparent;
            border-radius: 1rem;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: bold;
        }

        .status-btn:hover, .status-btn:active {
            transform: scale(0.98);
        }

        .status-btn-empty {
            background: var(--danger);
            color: white;
        }

        .status-btn-empty:hover, .status-btn-empty:active {
            background: var(--danger-dark);
            border-color: #fca5a5;
        }

        .status-btn-loaded {
            background: var(--success);
            color: white;
        }

        .status-btn-loaded:hover, .status-btn-loaded:active {
            background: var(--success-dark);
            border-color: #86efac;
        }

        .status-label {
            font-size: 3rem;
            margin-bottom: 0.5rem;
        }

        .status-icon {
            font-size: 4rem;
        }

        /* Confirmation screen */
        .confirm-card {
            background: var(--bg-light);
            border: 3px solid var(--success);
            border-radius: 1rem;
            padding: 2rem;
            text-align: center;
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .confirm-icon {
            font-size: 5rem;
            margin-bottom: 1rem;
        }

        .confirm-text {
            font-size: 2rem;
            font-weight: bold;
            color: var(--success);
            margin-bottom: 1rem;
        }

        .confirm-details {
            font-size: 1.25rem;
            color: var(--text-muted);
            margin-bottom: 2rem;
        }

        .confirm-return {
            margin-top: auto;
            font-size: 1.25rem;
            color: var(--text-muted);
            padding: 1rem;
            border-top: 2px solid var(--bg-lighter);
            width: 100%;
        }

        /* Loading spinner */
        .loading {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.8);
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .loading.active {
            display: flex;
        }

        .spinner {
            width: 60px;
            height: 60px;
            border: 4px solid var(--bg-lighter);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Utility */
        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>
    <!-- Header -->
    <header class="header">
        <h1><span class="header-icon">📦</span> Loader</h1>
        <div id="current-loader" class="loader-name"></div>
    </header>

    <!-- Screen 1: Name Selection -->
    <div id="screen-names" class="screen active">
        <h2 style="text-align: center; color: var(--text-muted);">Select your name</h2>
        <div id="name-grid" class="name-grid">
            <!-- Names populated by JS -->
        </div>
    </div>

    <!-- Screen 2: Door Entry -->
    <div id="screen-door" class="screen">
        <div class="door-display">
            <div id="door-display-content">
                <span class="door-placeholder">Enter door number</span>
            </div>
        </div>
        <div class="keypad">
            <button class="key" data-key="1">1</button>
            <button class="key" data-key="2">2</button>
            <button class="key" data-key="3">3</button>
            <button class="key" data-key="4">4</button>
            <button class="key" data-key="5">5</button>
            <button class="key" data-key="6">6</button>
            <button class="key" data-key="7">7</button>
            <button class="key" data-key="8">8</button>
            <button class="key" data-key="9">9</button>
            <button class="key backspace" data-key="backspace">⌫</button>
            <button class="key" data-key="0">0</button>
            <button class="key" style="visibility: hidden;"></button>
            <button class="key submit" data-key="submit">SUBMIT</button>
        </div>
    </div>

    <!-- Screen 3: Verification -->
    <div id="screen-verify" class="screen">
        <div class="verify-card">
            <div class="verify-door">🚪 DOOR <span id="verify-door-num"></span></div>
            <div class="verify-trailer" id="verify-trailer-num"></div>
            <div class="verify-carrier" id="verify-carrier"></div>
            <div class="verify-question">Is this correct?</div>
            <div class="verify-buttons">
                <button class="btn btn-yes" id="btn-yes">✅ YES</button>
                <button class="btn btn-no" id="btn-no">❌ NO</button>
            </div>
        </div>
    </div>

    <!-- Screen 4: Status Buttons -->
    <div id="screen-status" class="screen">
        <div class="status-header">
            <div class="status-door">🚪 DOOR <span id="status-door-num"></span></div>
            <div class="status-trailer" id="status-trailer-info"></div>
        </div>
        <div class="status-buttons">
            <button class="status-btn status-btn-empty" id="btn-empty">
                <span class="status-label">EMPTY</span>
                <span class="status-icon">🔴</span>
            </button>
            <button class="status-btn status-btn-loaded" id="btn-loaded">
                <span class="status-label">LOADED</span>
                <span class="status-icon">🟢</span>
            </button>
        </div>
    </div>

    <!-- Screen 5: Confirmation -->
    <div id="screen-confirm" class="screen">
        <div class="confirm-card">
            <div class="confirm-icon">✅</div>
            <div class="confirm-text">SAVED!</div>
            <div class="confirm-details" id="confirm-details"></div>
            <div class="confirm-return">Tap anywhere to return to name selection</div>
        </div>
    </div>

    <!-- Error Screen -->
    <div id="screen-error" class="error-screen">
        <div class="error-icon">⚠️</div>
        <div class="error-text">Radio Manager ASAP</div>
        <div class="error-subtext">Trailer mismatch</div>
        <div class="error-tap">Tap anywhere to start over</div>
    </div>

    <!-- Loading Overlay -->
    <div id="loading" class="loading">
        <div class="spinner"></div>
    </div>

    <script>
        // State
        let currentLoader = null;
        let currentDoorNumber = '';
        let currentTrailer = null;
        let token = localStorage.getItem('dockboard_token');

        // Screens
        const screens = {
            names: document.getElementById('screen-names'),
            door: document.getElementById('screen-door'),
            verify: document.getElementById('screen-verify'),
            status: document.getElementById('screen-status'),
            confirm: document.getElementById('screen-confirm'),
            error: document.getElementById('screen-error'),
        };

        // Show a specific screen
        function showScreen(name) {
            Object.values(screens).forEach(s => s.classList.remove('active'));
            screens[name].classList.add('active');
        }

        // Check auth and role
        async function checkAuth() {
            if (!token) {
                window.location.href = '/';
                return false;
            }

            try {
                const res = await fetch('/api/auth/status', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await res.json();

                if (!data.authenticated || (data.user.role !== 'loader' && data.user.role !== 'admin')) {
                    window.location.href = '/';
                    return false;
                }

                currentLoader = data.user.username;
                document.getElementById('current-loader').textContent = currentLoader;
                return true;
            } catch (err) {
                console.error('Auth check failed:', err);
                window.location.href = '/';
                return false;
            }
        }

        // Load loader names (for name selection - admin users with loader role)
        async function loadLoaderNames() {
            try {
                const res = await fetch('/api/users', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await res.json();

                // Filter to only loader role users
                const loaders = data.users.filter(u => u.role === 'loader' && u.active !== false);
                loaders.sort((a, b) => a.username.localeCompare(b.username));

                const grid = document.getElementById('name-grid');
                grid.innerHTML = '';

                loaders.forEach(loader => {
                    const btn = document.createElement('button');
                    btn.className = 'name-btn';
                    btn.textContent = loader.username;
                    btn.onclick = () => selectLoader(loader.username);
                    grid.appendChild(btn);
                });

                if (loaders.length === 0) {
                    grid.innerHTML = '<div style="grid-column: span 2; text-align: center; color: var(--text-muted); padding: 2rem;">No loader accounts found. Contact admin.</div>';
                }
            } catch (err) {
                console.error('Failed to load loaders:', err);
            }
        }

        // Select loader
        function selectLoader(name) {
            currentLoader = name;
            document.getElementById('current-loader').textContent = currentLoader;
            currentDoorNumber = '';
            updateDoorDisplay();
            showScreen('door');
        }

        // Update door display
        function updateDoorDisplay() {
            const display = document.getElementById('door-display-content');
            if (currentDoorNumber) {
                display.innerHTML = `<span class="door-number">${currentDoorNumber}</span>`;
            } else {
                display.innerHTML = `<span class="door-placeholder">Enter door number</span>`;
            }
        }

        // Keypad handling
        document.querySelectorAll('.key').forEach(key => {
            key.addEventListener('click', () => {
                const k = key.dataset.key;

                if (k === 'backspace') {
                    currentDoorNumber = currentDoorNumber.slice(0, -1);
                } else if (k === 'submit') {
                    submitDoor();
                } else if (currentDoorNumber.length < 3) {
                    currentDoorNumber += k;
                }

                updateDoorDisplay();
            });
        });

        // Submit door number
        async function submitDoor() {
            if (!currentDoorNumber) return;

            document.getElementById('loading').classList.add('active');

            try {
                const res = await fetch('/api/loader/door', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ doorNumber: parseInt(currentDoorNumber) })
                });

                const data = await res.json();

                if (!res.ok) {
                    throw new Error(data.error || 'Failed to get door info');
                }

                if (!data.trailer) {
                    // No trailer at door - show error
                    showScreen('error');
                    return;
                }

                currentTrailer = data.trailer;

                // Show verification screen
                document.getElementById('verify-door-num').textContent = currentDoorNumber;
                document.getElementById('verify-trailer-num').textContent = data.trailer.number;
                document.getElementById('verify-carrier').textContent = data.trailer.carrier;
                showScreen('verify');

            } catch (err) {
                console.error('Error:', err);
                alert('Error: ' + err.message);
            } finally {
                document.getElementById('loading').classList.remove('active');
            }
        }

        // Verification buttons
        document.getElementById('btn-yes').addEventListener('click', () => {
            // Show status selection
            document.getElementById('status-door-num').textContent = currentDoorNumber;
            document.getElementById('status-trailer-info').textContent = `${currentTrailer.carrier} ${currentTrailer.number}`;
            showScreen('status');
        });

        document.getElementById('btn-no').addEventListener('click', () => {
            showScreen('error');
        });

        // Status buttons
        document.getElementById('btn-empty').addEventListener('click', () => updateStatus('empty'));
        document.getElementById('btn-loaded').addEventListener('click', () => updateStatus('loaded'));

        // Update status
        async function updateStatus(status) {
            document.getElementById('loading').classList.add('active');

            try {
                const res = await fetch('/api/loader/status', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({
                        doorNumber: parseInt(currentDoorNumber),
                        status: status,
                        loaderName: currentLoader
                    })
                });

                const data = await res.json();

                if (!res.ok) {
                    throw new Error(data.error || 'Failed to update status');
                }

                // Show confirmation
                document.getElementById('confirm-details').textContent =
                    `${currentTrailer.carrier} ${currentTrailer.number} marked ${status.toUpperCase()} at Door ${currentDoorNumber}`;
                showScreen('confirm');

                // Auto-return after 3 seconds
                setTimeout(() => {
                    resetToNameSelection();
                }, 3000);

            } catch (err) {
                console.error('Error:', err);
                alert('Error: ' + err.message);
            } finally {
                document.getElementById('loading').classList.remove('active');
            }
        }

        // Reset to name selection
        function resetToNameSelection() {
            currentDoorNumber = '';
            currentTrailer = null;
            updateDoorDisplay();
            showScreen('names');
        }

        // Error screen tap to reset
        document.getElementById('screen-error').addEventListener('click', resetToNameSelection);

        // Confirmation screen tap to reset
        document.getElementById('screen-confirm').addEventListener('click', resetToNameSelection);

        // Initialize
        async function init() {
            const authed = await checkAuth();
            if (authed) {
                await loadLoaderNames();
            }
        }

        init();
    </script>
</body>
</html>
